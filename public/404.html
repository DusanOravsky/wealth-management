<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Wealth Manager</title>
  <script>
    // GitHub Pages SPA redirect: store the path and redirect to the root
    // so the Next.js app can handle client-side routing.
    var path = window.location.pathname;
    var base = '/wealth-management';
    // Strip the basePath prefix if present
    var appPath = path.startsWith(base) ? path.slice(base.length) : path;
    sessionStorage.setItem('wm_spa_redirect', appPath || '/');
    window.location.replace(base + '/');
  </script>
</head>
<body>Presmerovávam...</body>
</html>
